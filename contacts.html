<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">   <!-- Адаптация страницы под устройства-->
    <title>Контакты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
 <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Левое меню -->
        <nav class="col-2 bg-dark text-white vh-100 p-3">
          <h4 class="mb-4">Меню</h4>
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link text-white" href="main_page.html">Главная</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="catalog.html">Каталог</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="category.html">Категории</a></li>
            <li class="nav-item"><a class="nav-link text-white active" href="contacts.html">Контакты</a></li>
          </ul>
        </nav>

        <!-- Контент -->
        <main class="col-10 p-5">
          <h1 class="mb-6 mt-6 text-center">Контакты</h1>
          <div class="row">

            <!-- Форма -->
            <div class="col-md-6">
              <!-- метод POST + action "/" -->
              <form method="post" action="/">
                <div class="mb-3">
                  <label for="name" class="form-label">Имя</label>
                  <input type="text" class="form-control" id="name" name="name" placeholder="Ваше имя">
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Почта</label>
                  <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com">
                </div>
                <div class="mb-3">
                  <label for="message" class="form-label">Сообщение</label>
                  <textarea class="form-control" id="message" name="message" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Отправить</button>
              </form>
            </div>

            <div class="col-md-1"></div>

              <!-- Блок с текстом -->
            <div class="col-md-5 mt-4">
              <h3>Наши контакты</h3>
              <p>Контактов пока нет! Однако есть загадка: что требует ответа, не задавая при этом вопроса?</p>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
